<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <script>
      (function () {
        var savedTheme = null;
        try {
          savedTheme = localStorage.getItem("agno-deep-agent-theme");
        } catch (error) {
          savedTheme = null;
        }
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Agno Deep Agent home">
        <span class="brand-mark">A</span>
        <span>Agno Deep Agent</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/getting-started.html' | relative_url }}">Get Started</a>
        <a href="{{ '/cli.html' | relative_url }}">CLI</a>
        <a href="{{ '/python-api.html' | relative_url }}">API</a>
        <a href="{{ '/models.html' | relative_url }}">Models</a>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">Dark</button>
        <a class="nav-button" href="https://github.com/devalexandre/Agno-Deep-Agents">GitHub</a>
      </nav>
    </header>
    <div class="shell">
      <aside class="sidebar" aria-label="Documentation navigation">
        <p class="sidebar-label">Documentation</p>
        <a href="{{ '/' | relative_url }}">Overview</a>
        <a href="{{ '/getting-started.html' | relative_url }}">Get Started</a>
        <a href="{{ '/cli.html' | relative_url }}">CLI</a>
        <a href="{{ '/python-api.html' | relative_url }}">Python API</a>
        <a href="{{ '/models.html' | relative_url }}">Models and Ollama</a>
        <a href="{{ '/architecture.html' | relative_url }}">Architecture</a>
        <a href="{{ '/protocols.html' | relative_url }}">Protocols</a>
        <a href="{{ '/skills.html' | relative_url }}">Skills</a>
        <a href="{{ '/roadmap.html' | relative_url }}">Roadmap</a>
        <a href="{{ '/github-pages.html' | relative_url }}">GitHub Pages</a>
        <a href="{{ '/troubleshooting.html' | relative_url }}">Troubleshooting</a>
      </aside>
      <main class="content">
        {{ content }}
      </main>
    </div>
    <script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  </body>
</html>
